<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Sermon</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:70%;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input, textarea, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:20px;
        }

        button{
            background:#8B0000;
            color:white;
            padding:12px 20px;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Add Sermon</h1>

<form action="/admin/add-sermon" method="POST">

<label>Title</label>
<input type="text" name="title" required>

<label>Bible Verse</label>
<input type="text" name="bible_verse" required>

<label>Scripture References</label>
<input type="text" name="references">

<label>Category</label>

<select name="category">

<option>Sunday Service</option>

<option>Revival</option>

<option>Bible Study</option>

<option>Youth Service</option>

<option>Prayer Meeting</option>

</select>

<label>Date</label>
<input type="date" name="date">

<label>Preacher</label>
<input type="text" name="created_by">

<label>Sermon</label>

<textarea
name="content"
rows="15"
required>
</textarea>

<button type="submit">
Save Sermon
</button>

</form>

</div>

</body>
</html>
