<!DOCTYPE html>
<html>
<head>
    <title>Church Home</title>
</head>
<body>

{{if .LoggedIn}}
    <h3>Welcome {{.Name}} 🙏</h3>
    <a href="/logout">Logout</a>
{{else}}
    <a href="/login">Login</a>
    <a href="/register">Register</a>
{{end}}

<hr>

<h2>Announcements</h2>

{{range .Announcements}}
    <div>
        <h3>{{.Title}}</h3>
        <p>{{.Message}}</p>
    </div>
    <hr>
{{end}}

</body>
</html>
